<!DOCTYPE html><html><head><meta charset="utf-8"><title>RUNNING</title></head><body>
<pre id="out">running…</pre>
<script src="vendor/qrious.min.js"></script>
<script src="vendor/jsQR.min.js"></script>
<script type="module">
// color-live-loopback.html — 5.2 E2E through the LIVE frame layout (strip border + body):
// TX composeFrameRGBA → synthetic channel over the WHOLE frame → RX sampleFrame → strip
// estimate (mean-in-linear) → warm-up → decodeSIC → majority → jsQR ×6 → BlindFireReceiver.
import { BlindFireSender } from './js/blindfire-tx.js';
import { BlindFireReceiver } from './js/blindfire-rx.js';
import { composeFrameRGBA, sampleFrame } from './js/colorframe.js';
import { decodeSIC, simulateChannel, PEDESTAL } from './js/colorplane.js';
import { stripPatches, estimateModel } from './js/calibrate.js';
import { FALLBACK_MODEL, linearize } from './js/channelstats.js';

const ALLOC = { R: 2, G: 2, B: 2 }, BLOCK = 250, META_EVERY = 8;
function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=(a+0x6D2B79F5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

async function main() {
  const file = new Uint8Array(20 * 1024);
  { const r = mulberry32(42); for (let i = 0; i < file.length; i++) file[i] = (r() * 256) | 0; }
  const srcSha = new Uint8Array(await crypto.subtle.digest('SHA-256', file));

  const tx = await BlindFireSender.create(file, { blockSize: BLOCK, fileId: 0x5151 });
  const rx = new BlindFireReceiver();
  const noise = mulberry32(1234);
  const meta = { fileName: 'live.bin', mimeType: 'application/octet-stream',
                 color: { alloc: ALLOC, pedestal: PEDESTAL, bodyPx: 0 } };

  const qrCv = document.createElement('canvas');
  const qr = new QRious({ element: qrCv, level: 'M', size: 600 });
  const work = document.createElement('canvas');
  const wctx = work.getContext('2d', { willReadFrequently: true });
  const toStr = (pkt) => { let s = ''; for (const b of pkt) s += String.fromCharCode(b); return s; };

  let frames = 0, planeFail = 0, warm = 0, estHist = [];
  let estModel = null;
  const T0 = performance.now();
  while (!rx.done && frames < 200) {
    frames++;
    // TX: 6 packets -> 6 QR pixel bitmaps -> full frame with strip border
    const bitmaps = []; let W = 0;
    for (let p = 0; p < 6; p++) {
      const pkt = (frames % META_EVERY === 1 && p === 0) ? tx.metaPacket(meta) : tx.nextPacket();
      qr.value = toStr(pkt);
      if (!W) { W = qr.canvas.width; work.width = W; work.height = W; }
      wctx.drawImage(qr.canvas, 0, 0, W, W);
      const d = wctx.getImageData(0, 0, W, W).data;
      const bits = new Uint8Array(W * W);
      for (let i = 0; i < W * W; i++) bits[i] = d[4 * i] < 128 ? 1 : 0;
      bitmaps.push(bits);
    }
    const frame = composeFrameRGBA(bitmaps, W, ALLOC);
    // channel over the WHOLE frame (strip included — that is the point)
    const N = frame.width * frame.height;
    const chan = { R: new Uint8Array(N), G: new Uint8Array(N), B: new Uint8Array(N) };
    for (let i = 0; i < N; i++) { chan.R[i] = frame.data[4*i]; chan.G[i] = frame.data[4*i+1]; chan.B[i] = frame.data[4*i+2]; }
    const obsC = simulateChannel(chan, FALLBACK_MODEL, noise);
    const obsImg = { data: new Uint8ClampedArray(N * 4), width: frame.width, height: frame.height };
    for (let i = 0; i < N; i++) { obsImg.data[4*i]=obsC.R[i]; obsImg.data[4*i+1]=obsC.G[i]; obsImg.data[4*i+2]=obsC.B[i]; obsImg.data[4*i+3]=255; }
    // RX: sample strip -> estimate; warm-up 2 frames before trusting decode
    const { observedStrip, body } = sampleFrame(obsImg, W);
    const disp = stripPatches();
    const obs = observedStrip.map((samples) => {
      const meanLin = [0,0,0], mu = [0,0,0], std = [0,0,0];
      for (const s of samples) for (let c = 0; c < 3; c++) { meanLin[c] += linearize(s[c]) / samples.length; mu[c] += s[c] / samples.length; }
      for (const s of samples) for (let c = 0; c < 3; c++) std[c] += (s[c] - mu[c]) ** 2 / samples.length;
      return { meanLin, std: std.map(Math.sqrt) };
    });
    estModel = estimateModel(disp, obs);
    if (warm < 2) { warm++; continue; }                 // warm-up: estimator only
    const back = decodeSIC(body, ALLOC, estModel, PEDESTAL);
    // majority filter + jsQR per plane
    for (let p = 0; p < 6; p++) {
      const f = new Uint8Array(W * W);
      for (let y = 0; y < W; y++) for (let x = 0; x < W; x++) {
        let s = 0, c = 0;
        for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
          const yy = y + dy, xx = x + dx;
          if (yy < 0 || xx < 0 || yy >= W || xx >= W) continue;
          s += back[p][yy * W + xx]; c++;
        }
        f[y * W + x] = s * 2 > c ? 1 : 0;
      }
      const img = new Uint8ClampedArray(W * W * 4);
      for (let i = 0; i < W * W; i++) { const v = f[i] ? 0 : 255; img[4*i]=img[4*i+1]=img[4*i+2]=v; img[4*i+3]=255; }
      const code = jsQR(img, W, W, { inversionAttempts: 'dontInvert' });
      if (!code || !code.binaryData || !code.binaryData.length) { planeFail++; continue; }
      rx.onPacket(new Uint8Array(code.binaryData));
    }
  }
  let shaExact = false;
  if (rx.done) {
    const out = await rx.result();
    const o = new Uint8Array(await crypto.subtle.digest('SHA-256', out));
    shaExact = srcSha.every((v, i) => v === o[i]);
  }
  document.getElementById('out').textContent = JSON.stringify({
    done: rx.done, shaExact, k: tx.k, frames, warmup: 2, planeFail,
    packetsFed: rx.packetsSeen, epsPct: +(100 * (rx.packetsSeen / tx.k - 1)).toFixed(1),
    metaColor: rx.meta && rx.meta.color ? rx.meta.color : null,
    ms: Math.round(performance.now() - T0),
  });
  document.title = 'DONE';
}
main().catch((e) => { document.getElementById('out').textContent = 'ERROR: ' + (e.stack || e); document.title = 'ERROR'; });
</script></body></html>
